name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  export-android:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Godot 4.3
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download Godot Export Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          unzip -q Godot_v4.3-stable_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.3.stable/

      - name: Generate Debug Keystore
        run: |
          cd orbita-godot
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999

      - name: Fix Editor Settings and Presets
        run: |
          mkdir -p ~/.config/godot
          cat <<'SETTINGSEOF' > ~/.config/godot/editor_settings-4.tres
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          SETTINGSEOF
          
          # Force the absolute path directly into the export_presets.cfg
          cd orbita-godot
          sed -i "s|keystore/debug=\"\"|keystore/debug=\"${GITHUB_WORKSPACE}/orbita-godot/debug.keystore\"|g" export_presets.cfg
          sed -i "s|keystore/debug_user=\"\"|keystore/debug_user=\"androiddebugkey\"|g" export_presets.cfg
          sed -i "s|keystore/debug_password=\"\"|keystore/debug_password=\"android\"|g" export_presets.cfg

      - name: Pre-import assets
        run: |
          cd orbita-godot
          godot --headless --editor --quit || true

      - name: Build APK
        run: |
          cd orbita-godot
          mkdir -p build
          godot --headless --export-debug "Android" build/ORBITA_Flow_Arena_v0.1.apk

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ORBITA-Flow-Arena-APK
          path: orbita-godot/build/ORBITA_Flow_Arena_v0.1.apk
