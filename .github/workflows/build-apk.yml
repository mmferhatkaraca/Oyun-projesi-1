name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  export-android:
    name: Build APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Templates and Editor Settings
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.3.stable ~/.local/share/godot/export_templates/4.3.stable
          
          mkdir -p ~/.config/godot
          REAL_JAVA_PATH=$(dirname $(dirname $(readlink -f $(which java))))
          
          cat <<SETTINGSEOF > ~/.config/godot/editor_settings-4.tres
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "/usr/lib/android-sdk"
          export/android/java_sdk_path = "$REAL_JAVA_PATH"
          SETTINGSEOF

      - name: Configure Project Preset
        run: |
          cd orbita-godot
          # Remove any existing keystore lines
          sed -i '/keystore\/debug/d' export_presets.cfg
          # Add them explicitly with the container's known keystore
          sed -i '/\[preset.0.options\]/a keystore/debug="/root/debug.keystore"\nkeystore/debug_user="androiddebugkey"\nkeystore/debug_password="android"' export_presets.cfg

      - name: Pre-import assets
        run: |
          cd orbita-godot
          godot --headless --editor --quit || true

      - name: Export APK
        run: |
          cd orbita-godot
          mkdir -p build
          godot --headless --verbose --export-debug "Android" build/ORBITA_Flow_Arena_v0.1.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ORBITA-Flow-Arena-APK
          path: orbita-godot/build/ORBITA_Flow_Arena_v0.1.apk
