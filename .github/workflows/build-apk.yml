name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  export-android:
    name: Build APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.2.2.stable ~/.local/share/godot/export_templates/4.2.2.stable

      - name: Pre-import assets
        run: |
          cd orbita-godot
          godot --headless --editor --quit || true

      - name: Export APK
        run: |
          cd orbita-godot
          mkdir -p build
          godot --headless --export-debug "Android" build/ORBITA_Flow_Arena_v0.1.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ORBITA-Flow-Arena-APK
          path: orbita-godot/build/ORBITA_Flow_Arena_v0.1.apk
