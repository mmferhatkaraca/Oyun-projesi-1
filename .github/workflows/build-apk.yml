name: Build Android APK (Gradle Template Build)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  export-android:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: |
          yes | sdkmanager "build-tools;33.0.2" "platforms;android-33" "build-tools;34.0.0" "platforms;android-34" "cmdline-tools;latest" "cmake;3.22.1" "ndk;25.2.9519653"

      - name: Download Godot 4.3
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download Godot Android Template
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          unzip -q Godot_v4.3-stable_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.3.stable/

      - name: Generate Debug Keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999

      - name: Configure Godot Editor
        run: |
          mkdir -p ~/.config/godot
          cat <<EOF > ~/.config/godot/editor_settings-4.tres
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "${ANDROID_SDK_ROOT}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "${GITHUB_WORKSPACE}/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Install Android Build Template
        run: |
          cd orbita-godot
          godot --headless --install-android-build-template || true

      - name: Enable Gradle Build in Preset
        run: |
          cd orbita-godot
          sed -i 's/generate\/build_gradle_and_aab=false/generate\/build_gradle_and_aab=true/g' export_presets.cfg
          sed -i '/keystore\/debug/d' export_presets.cfg
          sed -i "/\[preset.0.options\]/a keystore/debug=\"${GITHUB_WORKSPACE}/debug.keystore\"\nkeystore/debug_user=\"androiddebugkey\"\nkeystore/debug_password=\"android\"" export_presets.cfg

      - name: Export APK via Gradle
        run: |
          cd orbita-godot
          mkdir -p build
          godot --headless --export-debug "Android" build/ORBITA_Flow_Arena_v0.1.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ORBITA-Flow-Arena-APK
          path: orbita-godot/build/ORBITA_Flow_Arena_v0.1.apk
