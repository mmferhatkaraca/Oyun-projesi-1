name: Build Android APK (Manual Pack)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  export-android:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Download Godot 4.3
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download Godot Android Template
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip -q Godot_v4.3-stable_export_templates.tpz templates/android_debug.apk

      - name: Generate Debug Keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999

      - name: Export PCK
        run: |
          cd orbita-godot
          mkdir -p build
          godot --headless --export-pack "PCK" build/orbita.pck

      - name: Manually Package APK
        run: |
          # Copy base template
          cp templates/android_debug.apk ORBITA_raw.apk
          
          # Inject PCK into assets/project.pck
          mkdir -p assets
          cp orbita-godot/build/orbita.pck assets/project.pck
          zip -u ORBITA_raw.apk assets/project.pck

          # Align APK
          $ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign -p -f 4 ORBITA_raw.apk ORBITA_aligned.apk

          # Sign APK
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android ORBITA_aligned.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ORBITA-Flow-Arena-APK
          path: ORBITA_aligned.apk
