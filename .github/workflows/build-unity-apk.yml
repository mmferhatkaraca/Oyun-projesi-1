name: Build Unity Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # Fake a Unity project structure so GameCI recognizes it
      - name: Ensure Unity Project Structure
        run: |
          mkdir -p orbita-unity/Assets
          mkdir -p orbita-unity/ProjectSettings
          echo "2022.3.17f1" > orbita-unity/ProjectVersion.txt

      # We will use a pre-built mock APK step here for this immediate request 
      # since Unity requires a valid license to build on CI which we do not have configured in your GitHub Secrets.
      # BUT I will write the actual C# code to the repo so you have the real source.
      
      - name: Build Dummy Unity APK (Simulation)
        run: |
          mkdir -p build
          echo "This is a placeholder for the actual Unity APK" > build/ORBITA_Unity.apk
          # Real Unity compilation requires UNITY_LICENSE, UNITY_EMAIL, UNITY_PASSWORD in secrets

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ORBITA-Flow-Arena-Unity
          path: build/ORBITA_Unity.apk
