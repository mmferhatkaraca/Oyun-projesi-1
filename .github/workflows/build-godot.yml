name: Build Godot Strategy APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Godot Engine
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          chmod +x Godot_v4.3-stable_linux.x86_64

      - name: Download Godot Android Template
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip -q Godot_v4.3-stable_export_templates.tpz templates/android_debug.apk

      - name: Generate Android Keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999

      - name: Setup Android SDK Build Tools
        uses: android-actions/setup-android@v3

      - name: Export and Inject PCK
        run: |
          yes | sdkmanager "build-tools;34.0.0"
          
          # Godot üzerinden oyunu PCK (Veri Paketi) olarak al
          cd orbita-godot
          ../Godot_v4.3-stable_linux.x86_64 --headless --export-pack "PCK" orbita.pck
          cd ..
          
          # Resmi Android Template'ini kopyala
          cp templates/android_debug.apk RiseOfRealms_Raw.apk
          
          # Oyunu, APK'nın içine SIKIŞTIRMADAN (-0) enjekte et!
          mkdir -p assets
          cp orbita-godot/orbita.pck assets/project.pck
          zip -u -0 RiseOfRealms_Raw.apk assets/project.pck
          
          # APK'yı Android mimarisine hizala (Zipalign)
          $ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign -p -f 4 RiseOfRealms_Raw.apk RiseOfRealms_Aligned.apk
          
          # APK'yı İmzala (Apksigner)
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android RiseOfRealms_Aligned.apk

      - name: Upload Strategy APK
        uses: actions/upload-artifact@v4
        with:
          name: RiseOfRealms-Strategy-APK
          path: RiseOfRealms_Aligned.apk
