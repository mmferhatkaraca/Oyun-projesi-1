plugins {
    id 'com.android.application'
}

android {
    namespace 'com.orbita.flowarena'
    compileSdk 34

    defaultConfig {
        applicationId "com.orbita.flowarena"
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName "1.1"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
